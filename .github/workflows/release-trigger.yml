name: Release Trigger

run-name: Release `${{ inputs.bump_type }}`

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  issues: none
  pull-requests: none

jobs:
  release:
    name: Trigger Release
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          skip-token-revoke: true

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Get GitHub App bot user ID
        id: get-bot-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.get-bot-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Prepare release
        id: prepare
        uses: alexdlaird/.github/actions/prepare-release@main
        with:
          bump-type: ${{ inputs.bump_type }}
          repo-slug: alexdlaird/pyngrok

      - name: Bump version in source
        env:
          NEW_VERSION: ${{ steps.prepare.outputs.new-version }}
        run: |
          sed -i "s/^__version__ = \".*\"/__version__ = \"${NEW_VERSION}\"/" pyngrok/__init__.py

          grep -q "__version__ = \"${NEW_VERSION}\"" pyngrok/__init__.py || { echo "::error::Version bump failed in pyngrok/__init__.py"; exit 1; }

      - name: Commit and push
        id: commit
        env:
          NEW_VERSION: ${{ steps.prepare.outputs.new-version }}
        run: |
          git add CHANGELOG.md pyngrok/__init__.py
          git commit -m "Release ${NEW_VERSION}"
          git push

          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Merge main to develop
        run: |
          if git ls-remote --exit-code --heads origin develop > /dev/null 2>&1; then
            git fetch origin develop
            git checkout -B develop origin/develop
            if git merge --no-ff -m "Merge main into develop" origin/main; then
              git push origin develop
              echo "Successfully merged main to develop"
            else
              echo "::warning::Merge conflict merging main to develop. Manual merge required."
              git merge --abort
            fi
            git checkout main
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ steps.prepare.outputs.new-version }}
          RELEASE_NOTES: ${{ steps.prepare.outputs.release-notes }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          gh release create "$NEW_VERSION" \
            --target "$COMMIT_SHA" \
            --title "$NEW_VERSION" \
            --notes "$RELEASE_NOTES"
